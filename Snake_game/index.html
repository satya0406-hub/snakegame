<!DOCTYPE html>
<html>
<head>
<title>Snake Game</title>

<style>

body{
    background:#0f172a;
    font-family:Arial;
    text-align:center;
    color:white;
}

.container{
    margin-top:30px;
}

input,textarea{
    padding:10px;
    width:250px;
    border-radius:6px;
    border:none;
}

button{
    padding:10px 20px;
    background:#22c55e;
    border:none;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

canvas{
    background:black;
    margin-top:20px;
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>Snake Game</h1>

<div id="emailScreen">
<h3>Enter your Email</h3>
<input id="email" placeholder="email@example.com">
<br><br>
<button onclick="startGame()">Start Game</button>
</div>

<div id="gameScreen" class="hidden">

<h3 id="roundText">Round 1</h3>
<canvas id="game" width="400" height="400"></canvas>

<p>Score: <span id="score">0</span></p>

</div>

<div id="feedbackScreen" class="hidden">

<h2>Game Finished</h2>

<p>Your Scores:</p>

<p>Game 1: <span id="score1"></span></p>
<p>Game 2: <span id="score2"></span></p>

<h3>Your Feedback</h3>

<textarea id="feedback" rows="4"></textarea>

<br><br>

<button onclick="submitFeedback()">Submit</button>

</div>

</div>

<script>

let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let snake = [{x:200,y:200}];
let food = {x:100,y:100};

let dx = 20;
let dy = 0;

let score = 0;
let scores = [];
let round = 1;

function startGame(){

let email=document.getElementById("email").value;

if(email==""){
alert("Enter email first");
return;
}

document.getElementById("emailScreen").classList.add("hidden");
document.getElementById("gameScreen").classList.remove("hidden");

gameLoop=setInterval(draw,100);

}

document.addEventListener("keydown",direction);

function direction(event){

if(event.key=="ArrowLeft"){dx=-20;dy=0;}
if(event.key=="ArrowRight"){dx=20;dy=0;}
if(event.key=="ArrowUp"){dx=0;dy=-20;}
if(event.key=="ArrowDown"){dx=0;dy=20;}

}

function draw(){

ctx.fillStyle="black";
ctx.fillRect(0,0,400,400);

snake.unshift({
x:snake[0].x+dx,
y:snake[0].y+dy
});

if(snake[0].x==food.x && snake[0].y==food.y){

score+=10;

food={
x:Math.floor(Math.random()*20)*20,
y:Math.floor(Math.random()*20)*20
};

}else{

snake.pop();

}

if(
snake[0].x<0 ||
snake[0].x>=400 ||
snake[0].y<0 ||
snake[0].y>=400
){

endRound();
return;

}

ctx.fillStyle="red";
ctx.fillRect(food.x,food.y,20,20);

ctx.fillStyle="lime";

snake.forEach(part=>{
ctx.fillRect(part.x,part.y,20,20);
});

document.getElementById("score").innerText=score;

}

function endRound(){

clearInterval(gameLoop);

scores.push(score);

if(round==1){

round=2;

alert("Round 2 starting");

resetGame();

document.getElementById("roundText").innerText="Round 2";

gameLoop=setInterval(draw,100);

}else{

finishGame();

}

}

function resetGame(){

snake=[{x:200,y:200}];
dx=20;
dy=0;
score=0;

}

function finishGame(){

document.getElementById("gameScreen").classList.add("hidden");
document.getElementById("feedbackScreen").classList.remove("hidden");

document.getElementById("score1").innerText=scores[0];
document.getElementById("score2").innerText=scores[1];

}

function submitFeedback(){

let feedback=document.getElementById("feedback").value;

alert("Thanks for your feedback!");

console.log({
email:document.getElementById("email").value,
score1:scores[0],
score2:scores[1],
feedback:feedback
});

}

</script>

</body>
</html>
